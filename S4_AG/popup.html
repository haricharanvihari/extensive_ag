<!DOCTYPE html>
<html>
<head>
    <title>Market Gainer AI</title>
    <style>
        body {
            width: 400px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 0;
            color: #1e293b;
        }
        .header {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 1.25rem;
        }
        .container {
            padding: 15px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
        }
        .company-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #1e293b;
        }
        .symbol {
            color: #64748b;
            font-size: 0.875rem;
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .price {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .change {
            font-weight: 500;
        }
        .change.plus {
            color: #16a34a;
        }
        .change.minus {
            color: #dc2626;
        }
        .footer {
            padding: 10px;
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #1d4ed8;
        }
        #loading {
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Market Gainer AI</h1>
    </div>
    <div class="container">
        <button id="fetch-btn">Fetch Latest Gainers</button>
        <div id="loading" style="display: none;">Fetching data...</div>
        <div id="content" style="margin-top: 15px;">
            <!-- Data will be injected here -->
        </div>
    </div>
    <div class="footer">
        Powered by MCP & Prefab
    </div>
    <script src="popup.js"></script>
</body>
</html>
