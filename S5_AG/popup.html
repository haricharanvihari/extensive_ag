<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Calorie Planner</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Precision <span>Nutrition</span></h1>
            <p>Reasoning-Based Planning</p>
        </header>

        <main>
            <div class="input-grid">
                <div class="input-group">
                    <label>Age</label>
                    <input type="number" id="age" value="25">
                </div>
                <div class="input-group">
                    <label>Weight (kg)</label>
                    <input type="number" id="weight" value="70">
                </div>
                <div class="input-group">
                    <label>Height (cm)</label>
                    <input type="number" id="height" value="175">
                </div>
                <div class="input-group">
                    <label>Goal</label>
                    <select id="goal">
                        <option value="lose">Lose Weight</option>
                        <option value="maintain" selected>Maintain</option>
                        <option value="gain">Gain Weight</option>
                    </select>
                </div>
            </div>

            <div class="input-group full">
                <label>Activity Level</label>
                <select id="activity">
                    <option value="sedentary">Sedentary (Little/no exercise)</option>
                    <option value="light">Lightly Active (1-3 days/week)</option>
                    <option value="moderate" selected>Moderately Active (3-5 days/week)</option>
                    <option value="very active">Very Active (6-7 days/week)</option>
                </select>
            </div>

            <button id="calculate-btn">Calculate Plan</button>

            <div id="results" class="hidden">
                <div class="card reasoning">
                    <h3><span class="icon">🧠</span> Reasoning Log</h3>
                    <ul id="reasoning-list"></ul>
                </div>

                <div class="card summary">
                    <div class="stat-row">
                        <div class="stat">
                            <span class="label">Target</span>
                            <span class="value" id="target-cals">0</span>
                            <span class="unit">kcal</span>
                        </div>
                        <div class="stat">
                            <span class="label">Status</span>
                            <span class="value badge" id="verify-status">PASS</span>
                        </div>
                    </div>
                </div>

                <div class="meal-list" id="meal-container">
                    <!-- Meals will be injected here -->
                </div>
            </div>
        </main>
    </div>
    <script src="popup.js"></script>
</body>
</html>
